name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag 🏷️
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version across all packages 🔄
        run: |
          VERSION=${{ steps.extract_version.outputs.VERSION }}
          echo "Updating all packages to version $VERSION"
          
          # Atualiza a versão do root e de todos os workspaces
          npm version $VERSION --no-git-tag-version --include-workspace-root --workspaces
          
          # Atualiza as dependências internas (@multivendor/*) em cada package.json
          # O sed substituirá a versão de qualquer pacote @multivendor/* pela atual da release
          # O comando sed abaixo usa uma sintaxe compatível com o Ubuntu (usado no runner)
          find packages -name "package.json" -exec sed -i "s/\"@multivendor\/\([^\"]*\)\": \"[^\"]*\"/\"@multivendor\/\1\": \"$VERSION\"/g" {} +
          
          # Atualiza também as referências no package-lock.json para evitar E404 ao tentar validar versões antigas/inexistentes no registro
          # Sincroniza as versões dos pacotes internos no lockfile em todas as ocorrências
          sed -i "s/\"@multivendor\/\([^\"]*\)\": \"[^\"]*\"/\"@multivendor\/\1\": \"$VERSION\"/g" package-lock.json
          
          # Remove o package-lock.json e reinstala para garantir consistência total dos links de workspace sem buscar no registro
          rm package-lock.json
          npm install --package-lock-only

      - name: Build all packages
        run: npm run build

      # RELEASE
      - name: Publish packages on NPM 📦
        run: npm publish --workspaces --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
